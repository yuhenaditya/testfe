name: Deploy Frontend Dev

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, dev, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync frontend source
        run: |
          sudo rm -rf /opt/cci/apps/dev/frontend
          sudo mkdir -p /opt/cci/apps/dev/frontend
          sudo rsync -av --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "dist" \
            ./ /opt/cci/apps/dev/frontend/
          sudo chown -R devops:devops /opt/cci/apps/dev/frontend

      - name: Deploy frontend
        run: |
          cd /opt/cci/compose
          docker compose -f docker-compose.dev.yml build frontend-dev
          docker compose -f docker-compose.dev.yml up -d frontend-dev

      - name: Cleanup docker
        run: |
          docker image prune -f
